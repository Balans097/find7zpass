# ==============================================================================
#  Конфигурационный файл find7zpass
#  Формат: ключ = значение
#  Строки, начинающиеся с «#», и пустые строки — комментарии (игнорируются).
# ==============================================================================


# ------------------------------------------------------------------------------
# Язык интерфейса
#   ru  — русский (по умолчанию)
#   en  — English
# ------------------------------------------------------------------------------
lang = ru


# ------------------------------------------------------------------------------
# Путь к 7z-архиву, пароль к которому нужно подобрать.
# Можно передать путь к архиву и через аргумент командной строки:
#   ./find7zpass /path/to/archive.7z
# Аргумент командной строки имеет приоритет над этим параметром.
# ------------------------------------------------------------------------------
archive = archive.7z


# ------------------------------------------------------------------------------
# Файл со списком слов и спецсимволов.
# Содержит две обязательные секции: [patterns] и [specials].
# Подробности — в самом файле wordlist.txt.
# ------------------------------------------------------------------------------
wordlist = wordlist.txt


# ------------------------------------------------------------------------------
# Максимальное число паттернов в одной комбинации.
# При значении 3 программа проверит комбинации длиной 1, 2 и 3 паттерна.
#
# Оценка числа кандидатов (P = паттернов, S = спецсимволов с учётом пустого):
#   длина 1:  P   x S^2  кандидатов
#   длина 2:  P^2 x S^3  кандидатов
#   длина 3:  P^3 x S^4  кандидатов
# Каждое увеличение на 1 даёт экспоненциальный рост — будьте осторожны.
# ------------------------------------------------------------------------------
max_combo_len = 3


# ------------------------------------------------------------------------------
# Сколько проверенных паролей пропускать между строками прогресса.
# При значении 100 строка прогресса печатается каждые 100 проверок.
# ------------------------------------------------------------------------------
progress_step = 500
